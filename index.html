<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CSGO Market Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    margin: 0;
    padding: 20px;
}
h1 {
    text-align: center;
    margin-bottom: 30px;
}
.controls {
    text-align: center;
    margin-bottom: 20px;
}
select {
    padding: 8px;
    background: #1e293b;
    color: white;
    border: 1px solid #334155;
}
.chart-box {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 30px;
}
canvas {
    height: 300px !important;
}
</style>
</head>

<body>

<h1>📊 CSGO Market Analytics</h1>

<div class="controls">
    Таймфрейм:
    <select id="timeframe" onchange="updateCharts()">
        <option value="all">Всё время</option>
        <option value="week">7 дней</option>
        <option value="24h">24 часа</option>
        <option value="hour">1 час</option>
    </select>
</div>

<div class="chart-box">
    <canvas id="priceChart"></canvas>
</div>

<div class="chart-box">
    <canvas id="salesChart"></canvas>
</div>

<div class="chart-box">
    <canvas id="askChart"></canvas>
</div>

<script>
const API_KEY = 'AIzaSyDifgZJ9eXtgsmnEML385TpGC4j-MXdUt8';
const SPREADSHEET_ID = '1bpGUwuJa3FmPiYftfS-Yn7_gQlRpZNuJkFYSQ-d9zcQ';
const SHEET_NAME = 'Лист3';

let rawSnapshots = [];
let priceChart, salesChart, askChart;

async function fetchData() {
    if (rawSnapshots.length > 0) return rawSnapshots;

    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${SHEET_NAME}!A:A?key=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();

    rawSnapshots = data.values ? data.values : [];
    return rawSnapshots;
}

function filterByTimeframe(data, timeframe) {
    const now = Date.now();
    let cutoff;

    switch (timeframe) {
        case 'week': cutoff = now - 7*24*60*60*1000; break;
        case '24h': cutoff = now - 24*60*60*1000; break;
        case 'hour': cutoff = now - 60*60*1000; break;
        default: return data;
    }

    return data.filter(row => {
        try {
            const obj = JSON.parse(row[0]);
            return Date.parse(obj.timestamp) >= cutoff;
        } catch { return false; }
    });
}

function getAverages(snapshot) {
    const items = Object.values(snapshot.items);

    const avgPrice = items.reduce((a,b)=>a+b.price_usd,0) / items.length;
    const avgSales = items.reduce((a,b)=>a+b.sales7d,0);
    const avgAsk   = items.reduce((a,b)=>a+b.ask_count,0);

    return {avgPrice, avgSales, avgAsk};
}

function buildChart(ctx, label, data, color) {
    return new Chart(ctx, {
        type: 'line',
        data: {
            labels: data.labels,
            datasets: [{
                label: label,
                data: data.values,
                borderColor: color,
                backgroundColor: color + '33',
                tension: 0.25,
                fill: true
            }]
        },
        options: {
            responsive: true,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
                legend: { labels: { color: "#e2e8f0" } }
            },
            scales: {
                x: { ticks: { color: "#94a3b8" } },
                y: { ticks: { color: "#94a3b8" } }
            }
        }
    });
}

async function updateCharts() {
    const timeframe = document.getElementById("timeframe").value;
    const raw = await fetchData();
    const filtered = filterByTimeframe(raw, timeframe);

    const labels = [];
    const priceData = [];
    const salesData = [];
    const askData = [];

    filtered.forEach(row => {
        try {
            const snap = JSON.parse(row[0]);
            labels.push(new Date(snap.timestamp).toLocaleString());

            const {avgPrice, avgSales, avgAsk} = getAverages(snap);

            priceData.push(avgPrice);
            salesData.push(avgSales);
            askData.push(avgAsk);

        } catch {}
    });

    if (priceChart) priceChart.destroy();
    if (salesChart) salesChart.destroy();
    if (askChart) askChart.destroy();

    priceChart = buildChart(
        document.getElementById("priceChart"),
        "💰 Средняя цена (USD)",
        {labels, values: priceData},
        "#3b82f6"
    );

    salesChart = buildChart(
        document.getElementById("salesChart"),
        "📦  Продажи за 7 дней",
        {labels, values: salesData},
        "#22c55e"
    );

    askChart = buildChart(
        document.getElementById("askChart"),
        "🧱 Количество в стакане",
        {labels, values: askData},
        "#f59e0b"
    );
}

updateCharts();
</script>

</body>
</html>
